<!DOCTYPE html>
<html>
<head>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        body {
            margin: 0;
            padding: 15px;
            font-family: 'Inter', sans-serif;
            background-color: transparent;
        }
        
        .player-container {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            border: 1px solid #333;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .waveform-wrapper {
            width: 100%;
            height: 180px;
            background: #111;
            border-radius: 12px;
            overflow-x: auto;
            overflow-y: hidden;
            border: 1px solid #222;
            position: relative;
        }
        
        /* Custom Scrollbar */
        .waveform-wrapper::-webkit-scrollbar {
            height: 8px;
        }
        .waveform-wrapper::-webkit-scrollbar-track {
            background: #111;
            border-radius: 4px;
        }
        .waveform-wrapper::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }
        .waveform-wrapper::-webkit-scrollbar-thumb:hover {
            background: #4a90e2;
        }
        
        #waveform {
            min-width: 100%;
            height: 180px;
        }
        
        .controls-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }
        
        .left-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .play-button {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: none;
            background: #4a90e2;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(74, 144, 226, 0.4);
        }
        
        .play-button:hover {
            transform: scale(1.1) rotate(5deg);
            background: #357abd;
        }
        
        .play-button svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }
        
        .time-display {
            font-size: 14px;
            color: #aaa;
            font-family: 'Monaco', 'Consolas', monospace;
            background: #252525;
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #333;
        }
        
        .zoom-control {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #888;
            font-size: 12px;
            font-weight: 500;
        }
        
        input[type=range] {
            -webkit-appearance: none;
            width: 150px;
            background: transparent;
        }
        
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            background: #333;
            border-radius: 2px;
        }
        
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: #4a90e2;
            cursor: pointer;
            margin-top: -6px;
            box-shadow: 0 0 10px rgba(74, 144, 226, 0.5);
        }
    </style>
</head>
<body>
    <div class="player-container">
        <div class="waveform-wrapper">
            <div id="waveform"></div>
        </div>
        
        <div class="controls-row">
            <div class="left-controls">
                <button class="play-button" id="playPauseBtn">
                    <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    <svg id="pauseIcon" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                <div class="time-display" id="timeDisplay">00:00.00 / 00:00.00</div>
            </div>
            
            <div class="zoom-control">
                <span>ZOOM</span>
                <input type="range" id="zoomSlider" min="10" max="1000" value="100">
            </div>
        </div>
    </div>

    <script type="module">
        import WaveSurfer from 'https://unpkg.com/wavesurfer.js@7/dist/wavesurfer.esm.js'
        import RegionsPlugin from 'https://unpkg.com/wavesurfer.js@7/dist/plugins/regions.esm.js'

        const formatTime = (seconds) => {
            const minutes = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            const ms = Math.floor((seconds % 1) * 100);
            return `${minutes.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}.${ms.toString().padStart(2, '0')}`;
        };

        const wavesurfer = WaveSurfer.create({
            container: '#waveform',
            waveColor: '#444',
            progressColor: '#4a90e2',
            cursorColor: '#ff4b4b',
            cursorWidth: 2,
            height: 180,
            barWidth: 3,
            barGap: 2,
            barRadius: 4,
            minPxPerSec: 100,
            autoCenter: true,
            url: 'data:audio/wav;base64,{{AUDIO_BASE64}}',
        });
        
        const wsRegions = wavesurfer.registerPlugin(RegionsPlugin.create());
        
        const playBtn = document.getElementById('playPauseBtn');
        const playIcon = document.getElementById('playIcon');
        const pauseIcon = document.getElementById('pauseIcon');
        const timeDisplay = document.getElementById('timeDisplay');
        const zoomSlider = document.getElementById('zoomSlider');
        
        playBtn.onclick = () => wavesurfer.playPause();
        
        zoomSlider.oninput = (e) => {
            const minPxPerSec = Number(e.target.value);
            wavesurfer.zoom(minPxPerSec);
        };
        
        wavesurfer.on('play', () => {
            playIcon.style.display = 'none';
            pauseIcon.style.display = 'block';
        });
        
        wavesurfer.on('pause', () => {
            playIcon.style.display = 'block';
            pauseIcon.style.display = 'none';
        });
        
        wavesurfer.on('decode', (duration) => {
            timeDisplay.textContent = `00:00.00 / ${formatTime(duration)}`;
        });
        
        wavesurfer.on('timeupdate', (currentTime) => {
            timeDisplay.textContent = `${formatTime(currentTime)} / ${formatTime(wavesurfer.getDuration())}`;
        });

        wavesurfer.on('ready', () => {
            const grid = [{{MARKERS_JS}}];
            console.log("Master Grid: adding " + grid.length + " markers.");
            if (grid.length > 0) {
                console.log("First marker at: " + grid[0].time);
                console.log("Last marker at: " + grid[grid.length-1].time);
            }
            grid.forEach(m => {
                wsRegions.addRegion({
                    start: m.time,
                    end: m.time + 0.02,
                    color: 'rgba(74, 144, 226, 0.4)',
                    drag: false,
                    resize: false,
                });
            });
        });
    </script>
</body>
</html>
